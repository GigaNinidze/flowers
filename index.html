
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Flowers Demo</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    :root {
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    /* 1. Ensure the root elements have absolutely no background color */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: transparent !important;
    }

    /* 2. Force the AR canvas to be transparent and sit above the video */
    .a-canvas {
      background-color: transparent !important;
      z-index: 1 !important;
    }

    /* 3. Ensure the MindAR camera feed stays at the back but remains visible */
    video {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -2 !important;
    }

    /* UI Overlay Styles */
    .scan-overlay {
      position: fixed;
      top: var(--space-6);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      background: rgba(255, 245, 178, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #1F1F1F;
      text-align: center;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(31, 31, 31, 0.15);
      transition: opacity 220ms ease;
    }

    .scan-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .discount-badge {
      position: fixed;
      top: calc(var(--space-6) + 68px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      background: rgba(3, 206, 164, 0.88);
      color: #1F1F1F;
      text-align: center;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(31, 31, 31, 0.15);
    }

    .discount-badge.hidden {
      display: none;
    }

    .bottom-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: var(--space-6);
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 0 var(--space-4);
    }

    .glass-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius);
      background: rgba(250, 129, 72, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #1F1F1F;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(31, 31, 31, 0.2);
      border: none;
      cursor: pointer;
    }

    #startArButton {
      background: #C4D6B0;
    }

    .start-overlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(228, 179, 177, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .start-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }

    .start-logo {
      width: min(180px, 48vw);
      height: auto;
      display: block;
    }

    .start-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="startOverlay" class="start-overlay">
    <div class="start-panel">
      <img class="start-logo" src="./assets/logo.png" alt="Flower Shop logo" />
      <button id="startArButton" class="glass-button" type="button">Allow camera access</button>
    </div>
  </div>

  <div id="scanOverlay" class="scan-overlay">Scan the business card to see the flowers</div>
  <div id="discountBadge" class="discount-badge hidden">Discount code: FlowershopBarcelona2026</div>

  <div class="bottom-actions">
    <a class="glass-button" href="https://www.instagram.com/flowershop.barcelona/" target="_blank" rel="noopener noreferrer">
      Instagram
    </a>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/card.mind; autoStart: false; uiScanning: no; uiLoading: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 8; warmupTolerance: 5;"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="flowerModel" src="./assets/flower_bouquet_metool.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.05"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="0 2 1"></a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#flowerModel" rotation="90 0 0" position="0 -0.1 0" scale="4 4 4"></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector("a-scene");
    const startOverlay = document.getElementById("startOverlay");
    const startArButton = document.getElementById("startArButton");
    const scanOverlay = document.getElementById("scanOverlay");
    const discountBadge = document.getElementById("discountBadge");
    const cardTarget = document.getElementById("cardTarget");

    startArButton.addEventListener("click", () => {
      const mindarSystem = sceneEl.systems["mindar-image-system"];
      if (mindarSystem) {
        mindarSystem.start();
        startOverlay.classList.add("hidden");
      }
    });

    cardTarget.addEventListener("targetFound", () => {
      scanOverlay.classList.add("hidden");
      discountBadge.classList.remove("hidden");
    });

    cardTarget.addEventListener("targetLost", () => {
      scanOverlay.classList.remove("hidden");
      discountBadge.classList.add("hidden");
    });
  </script>
</body>
</html>
