
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Flowers Demo</title>
  <link rel="preload" href="./assets/flower_bouquet_metool.glb" as="fetch" crossorigin="anonymous" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    :root {
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --radius: 14px;
      /* semantic palette (avoid extra hard-coded hex in UI) */
      --color-vanilla: #fff5b2;
      --color-mint-confirm: #03cea4;
      --color-primary: #fa8148;
      --color-rose: #ca1551;
      --color-text: #1f1f1f;
    }

    * {
      box-sizing: border-box;
    }

    /* 1. Ensure the root elements have absolutely no background color */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: transparent !important;
    }

    /* 2. Force the AR canvas to be transparent and sit above the video */
    .a-canvas {
      background-color: transparent !important;
      z-index: 1 !important;
    }

    /* 3. Ensure the MindAR camera feed stays at the back but remains visible */
    video {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -2 !important;
    }

    /* UI Overlay Styles */
    .scan-overlay {
      position: fixed;
      top: var(--space-6);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      background: rgba(255, 245, 178, 0.9);
      background: color-mix(in srgb, var(--color-vanilla) 90%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--color-text);
      text-align: center;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(31, 31, 31, 0.15);
      transition: opacity 220ms ease;
    }

    .scan-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .bottom-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: var(--space-6);
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 0 var(--space-4);
    }

    .glass-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius);
      background: rgba(228, 179, 177, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--color-text);
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(31, 31, 31, 0.2);
      border: none;
      cursor: pointer;
      transition: transform 200ms ease, box-shadow 200ms ease, opacity 200ms ease;
    }

    .glass-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      box-shadow: 0 6px 18px rgba(31, 31, 31, 0.12);
    }

    .glass-button:not(:disabled):active {
      transform: scale(0.98);
    }

    #startArButton {
      background: #c4d6b0;
      background: color-mix(in srgb, var(--color-mint-confirm) 35%, #c4d6b0);
    }

    .start-overlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(228, 179, 177, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .start-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }

    .start-hint {
      margin: 0;
      max-width: min(320px, 90vw);
      padding: 0 var(--space-3);
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.5;
      font-weight: 500;
      color: var(--color-text);
      letter-spacing: 0.01em;
    }

    .start-logo {
      width: min(180px, 48vw);
      height: auto;
      display: block;
    }

    .start-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="startOverlay" class="start-overlay">
    <div class="start-panel">
      <img class="start-logo" src="./assets/logo.png" alt="Flower Shop logo" />
      <p class="start-hint" id="startHint">For Augmented Reality Experience, please allow camera access</p>
      <button id="startArButton" class="glass-button" type="button" disabled aria-busy="true">Preparing experience…</button>
    </div>
  </div>

  <div id="scanOverlay" class="scan-overlay">Scan the business card to see the flowers</div>

  <div class="bottom-actions">
    <a
      class="glass-button"
      href="https://www.flowershopbarcelona.com/checkouts/cn/hWNBPUBFKe8KlWaZuu0rUUwV/es-es?_r=AQABksMKMrDvnQI-1_rz97HrsDaZXlqr4mYAyusKY1Dq&cart_link_id=oum4DuJH"
      target="_blank"
      rel="noopener noreferrer"
    >
      Buy now
    </a>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/card.mind; autoStart: false; uiScanning: no; uiLoading: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 8; warmupTolerance: 5;"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets timeout="120000">
      <a-asset-item id="flowerModel" src="./assets/flower_bouquet_metool.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.05"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="0 2 1"></a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#flowerModel" rotation="90 0 0" position="0 -0.1 0" scale="5 5 5"></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    (function () {
      const sceneEl = document.querySelector("a-scene");
      const startOverlay = document.getElementById("startOverlay");
      const startArButton = document.getElementById("startArButton");
      const scanOverlay = document.getElementById("scanOverlay");
      const cardTarget = document.getElementById("cardTarget");
      const assetsEl = sceneEl && sceneEl.querySelector("a-assets");
      const flowerModelAsset = document.getElementById("flowerModel");

      const LABEL_READY = "Allow Camera";
      const LABEL_LOAD = "Preparing experience…";
      const LABEL_FAIL = "Could not load 3D model — refresh";

      let arLaunchAllowed = false;

      function setStartReady(ready) {
        arLaunchAllowed = ready;
        if (ready) {
          startArButton.disabled = false;
          startArButton.textContent = LABEL_READY;
          startArButton.setAttribute("aria-busy", "false");
          startArButton.setAttribute("aria-label", "Start AR — allow camera access");
        } else {
          startArButton.disabled = true;
          startArButton.textContent = LABEL_LOAD;
          startArButton.setAttribute("aria-busy", "true");
        }
      }

      function onAssetFailure() {
        arLaunchAllowed = false;
        startArButton.disabled = true;
        startArButton.textContent = LABEL_FAIL;
        startArButton.setAttribute("aria-busy", "false");
        startArButton.setAttribute("aria-label", "3D model failed to load. Refresh the page.");
      }

      // A-Frame emits `loaded` on the scene only after `a-assets` have finished, so the GLB is fetched before the user can start AR.
      function onSceneLoaded() {
        setStartReady(true);
      }

      if (sceneEl) {
        if (sceneEl.hasLoaded) {
          onSceneLoaded();
        } else {
          sceneEl.addEventListener("loaded", onSceneLoaded, { once: true });
        }
      } else {
        onAssetFailure();
      }

      if (assetsEl) {
        assetsEl.addEventListener("timeout", onAssetFailure, { once: true });
      }

      if (flowerModelAsset) {
        flowerModelAsset.addEventListener("error", onAssetFailure, { once: true });
      }

      startArButton.addEventListener("click", () => {
        if (!arLaunchAllowed) {
          return;
        }
        const mindarSystem = sceneEl && sceneEl.systems["mindar-image-system"];
        if (!mindarSystem) {
          return;
        }
        startArButton.disabled = true;
        startArButton.setAttribute("aria-busy", "true");
        startArButton.textContent = "Starting…";
        const hideStart = () => {
          startOverlay.classList.add("hidden");
        };
        let startResult;
        try {
          startResult = mindarSystem.start();
        } catch (_e) {
          hideStart();
          return;
        }
        if (startResult && typeof startResult.then === "function") {
          startResult.then(hideStart).catch(hideStart);
        } else {
          requestAnimationFrame(hideStart);
        }
      });

      cardTarget.addEventListener("targetFound", () => {
        scanOverlay.classList.add("hidden");
      });

      cardTarget.addEventListener("targetLost", () => {
        scanOverlay.classList.remove("hidden");
      });
    })();
  </script>
</body>
</html>
