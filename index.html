<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Flowers Demo</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    :root {
      --color-primary: #FA8148;
      --color-danger: #CA1551;
      --color-success: #03CEA4;
      --color-bg: #E4B3B1;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--color-bg);
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .scan-overlay {
      position: fixed;
      top: var(--space-6);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      background: rgba(255, 245, 178, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #1F1F1F;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.2px;
      box-shadow: 0 8px 24px rgba(31, 31, 31, 0.15);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .scan-overlay.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(-6px);
      pointer-events: none;
    }

    .bottom-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: var(--space-6);
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 0 var(--space-4);
      gap: var(--space-3);
    }

    .glass-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius);
      background: rgba(250, 129, 72, 0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #1F1F1F;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(31, 31, 31, 0.2);
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .glass-button:hover,
    .glass-button:focus-visible {
      background: rgba(250, 129, 72, 0.42);
      transform: translateY(-1px);
      outline: none;
    }
  </style>
</head>
<body>
  <div id="scanOverlay" class="scan-overlay">Scan the business card to see the flowers</div>

  <div class="bottom-actions">
    <a
      class="glass-button"
      href="https://www.instagram.com/flowershop.barcelona/"
      target="_blank"
      rel="noopener noreferrer"
    >
      Instagram
    </a>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/card.mind; uiScanning: no; uiLoading: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true; alpha: true; antialias: true"
    background="color: transparent"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="flowerModel" src="./assets/flower_bouquet.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.05"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="0 2 1"></a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#flowerModel"
        rotation="90 0 0"
        position="0 0 0"
        scale="2 2 2"
      ></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const scanOverlay = document.getElementById("scanOverlay");
    const cardTarget = document.getElementById("cardTarget");

    cardTarget.addEventListener("targetFound", () => {
      scanOverlay.classList.add("hidden");
    });

    cardTarget.addEventListener("targetLost", () => {
      scanOverlay.classList.remove("hidden");
    });
  </script>
</body>
</html>
